name: Redhat Hardened Container Collector
run-name: ${{ github.actor }} is Collecting 🚀
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 1 * *" # Update on First of month at midnight UTC
  workflow_dispatch:

jobs:
  Date:
    runs-on: ubuntu-latest
    outputs:
      Date: ${{ steps.date.outputs.date }}
    steps:
      - name: Get current date
        id: DATE
        run: |
          echo "Setting Date"
          echo "DATE=$(date '+%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          echo -e "\nWrote to file:\n$GITHUB_OUTPUT\n"
          echo "Values:"
          cat $GITHUB_OUTPUT

  Skopeo:
    needs: [Date]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install Skopeo
        run: |
          sudo apt-get update -y
          sudo apt-get install -y skopeo pigz

      - name: ${{ vars.REGISTRY }} Login
        run: |
          echo '${{ secrets.REGISTRY_JSON }}' \
          | skopeo login  -u _json_key --password-stdin \
            ${{ vars.REGISTRY }}

      - name: Run Skopeo Sync
        run: |
          skopeo sync --scoped \
            --src yaml --dest dir \
            ${{ vars.COLLECTOR }}.yml \
            ${{ vars.COLLECTOR }}

      - name: Directory Contents
        run: |
          echo -e "Directory Contents\n$(ls -lAhS *)"
          echo -e "\n\nDirectory Size\n$(du -hd1)"

      - name: TARchive Skopeo Output
        run: |
          tar -cv -Ipigz --remove-files \
            -f ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}-skopeo.tgz ${{ vars.COLLECTOR }} \
          | tee ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}-skopeo.tgz.txt

      - name: Generate Hash
        run: |
          sha256sum -b ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}-skopeo.tgz | tee \
            ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}-skopeo.tgz.sha

      - name: List files 
        run: ls -Alht ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}-skopeo.tgz*

      - name: Upload TARchive, ToC, and hash
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}-skopeo.tgz
          path: ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}-skopeo.tgz*
          if-no-files-found: error

